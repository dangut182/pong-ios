<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pong 1 vs IA</title>

  <!-- PWA / iOS -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0b0f14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pong">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    html, body { height: 100%; margin: 0; background:#0b0f14; color:#e6edf3; font-family: system-ui, Arial; }
    .wrap { display:flex; align-items:center; justify-content:center; height:100%; }
    canvas { background:#070a0f; border:1px solid #223; border-radius:12px; box-shadow: 0 10px 30px rgba(0,0,0,.35); }
    .hint { position: fixed; left: 12px; bottom: 10px; font-size: 12px; opacity:.8; line-height:1.35; }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="c" width="900" height="520"></canvas>
  </div>
  <div class="hint">
    Controles: W/S (PC) · En iPhone agrega controles táctiles si quieres · Espacio reinicia · P pausa
  </div>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    const W = canvas.width, H = canvas.height;

    const paddleW = 14, paddleH = 110;
    const ballR = 8;

    const state = {
      paused: false,
      leftScore: 0,
      rightScore: 0,
      keys: new Set(),
      left:  { x: 28, y: (H - paddleH)/2, vy: 0 },
      right: { x: W - 28 - paddleW, y: (H - paddleH)/2, vy: 0 }, // IA
      ball:  { x: W/2, y: H/2, vx: 0, vy: 0 }
    };

    function resetBall(direction = (Math.random() < 0.5 ? -1 : 1)) {
      state.ball.x = W/2;
      state.ball.y = H/2;
      const speed = 420;
      const angle = (Math.random() * 0.6 - 0.3);
      state.ball.vx = direction * speed * Math.cos(angle);
      state.ball.vy = speed * Math.sin(angle);
    }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function drawCenterLine() {
      ctx.save();
      ctx.globalAlpha = 0.35;
      ctx.setLineDash([10, 14]);
      ctx.beginPath();
      ctx.moveTo(W/2, 18);
      ctx.lineTo(W/2, H-18);
      ctx.strokeStyle = "#9aa4b2";
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.restore();
    }

    function drawScore() {
      ctx.save();
      ctx.fillStyle = "#e6edf3";
      ctx.globalAlpha = 0.9;
      ctx.font = "700 42px system-ui, Arial";
      ctx.textAlign = "center";
      ctx.fillText(state.leftScore,  W/2 - 80, 58);
      ctx.fillText(state.rightScore, W/2 + 80, 58);
      ctx.restore();
    }

    function drawPaddle(p) {
      ctx.fillStyle = "#cbd5e1";
      ctx.fillRect(p.x, p.y, paddleW, paddleH);
    }

    function drawBall() {
      ctx.beginPath();
      ctx.arc(state.ball.x, state.ball.y, ballR, 0, Math.PI * 2);
      ctx.fillStyle = "#e6edf3";
      ctx.fill();
    }

    function collidePaddle(p) {
      const b = state.ball;

      const bx1 = b.x - ballR, bx2 = b.x + ballR;
      const by1 = b.y - ballR, by2 = b.y + ballR;

      const px1 = p.x, px2 = p.x + paddleW;
      const py1 = p.y, py2 = p.y + paddleH;

      const hit = bx2 >= px1 && bx1 <= px2 && by2 >= py1 && by1 <= py2;
      if (!hit) return false;

      if (b.vx < 0) b.x = px2 + ballR;
      else         b.x = px1 - ballR;

      b.vx *= -1;

      const hitPos = (b.y - (p.y + paddleH/2)) / (paddleH/2);
      const maxVy = 520;
      b.vy = clamp(b.vy + hitPos * 260, -maxVy, maxVy);

      const maxVx = 720;
      b.vx = clamp(b.vx * 1.05, -maxVx, maxVx);

      return true;
    }

    // IA (ajusta dificultad aquí)
    const AI_MAX_SPEED = 430;
    const AI_REACTION  = 0.12;
    const AI_NOISE     = 18;

    let aiTargetY = H/2;

    function updateAI(dt) {
      const b = state.ball;
      const r = state.right;

      const ballComing = b.vx > 0;

      if (ballComing) {
        const trend = b.vy * 0.18;
        const noise = (Math.random() - 0.5) * 2 * AI_NOISE;
        const desired = b.y + trend + noise;
        aiTargetY = aiTargetY + (desired - aiTargetY) * AI_REACTION;
      } else {
        const desired = H/2;
        aiTargetY = aiTargetY + (desired - aiTargetY) * (AI_REACTION * 0.6);
      }

      const centerY = r.y + paddleH/2;
      const error = aiTargetY - centerY;
      const vy = clamp(error * 6, -AI_MAX_SPEED, AI_MAX_SPEED);

      r.y = clamp(r.y + vy * dt, 12, H - 12 - paddleH);
    }

    function updatePlayer(dt) {
      const speed = 520;
      state.left.vy = 0;
      if (state.keys.has("KeyW")) state.left.vy = -speed;
      if (state.keys.has("KeyS")) state.left.vy =  speed;
      state.left.y = clamp(state.left.y + state.left.vy * dt, 12, H - 12 - paddleH);
    }

    function updateBall(dt) {
      const b = state.ball;
      b.x += b.vx * dt;
      b.y += b.vy * dt;

      if (b.y - ballR <= 10) { b.y = 10 + ballR; b.vy *= -1; }
      if (b.y + ballR >= H - 10) { b.y = H - 10 - ballR; b.vy *= -1; }

      collidePaddle(state.left);
      collidePaddle(state.right);

      if (b.x + ballR < 0) {
        state.rightScore++;
        resetBall(+1);
      } else if (b.x - ballR > W) {
        state.leftScore++;
        resetBall(-1);
      }
    }

    function render() {
      ctx.clearRect(0, 0, W, H);

      ctx.strokeStyle = "#1f2a44";
      ctx.lineWidth = 2;
      ctx.strokeRect(10, 10, W-20, H-20);

      drawCenterLine();
      drawScore();
      drawPaddle(state.left);
      drawPaddle(state.right);
      drawBall();

      if (state.paused) {
        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.45)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#e6edf3";
        ctx.font = "700 34px system-ui, Arial";
        ctx.textAlign = "center";
        ctx.fillText("PAUSA (P para continuar)", W/2, H/2);
        ctx.restore();
      }
    }

    // loop
    let last = performance.now();
    function loop(now) {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;

      if (!state.paused) {
        updatePlayer(dt);
        updateAI(dt);
        updateBall(dt);
      }
      render();
      requestAnimationFrame(loop);
    }

    // teclado (PC)
    window.addEventListener("keydown", (e) => {
      if (e.code === "KeyP") { state.paused = !state.paused; return; }
      if (e.code === "Space") { state.leftScore = 0; state.rightScore = 0; resetBall(); return; }
      state.keys.add(e.code);
    });
    window.addEventListener("keyup", (e) => state.keys.delete(e.code));

    resetBall();
    requestAnimationFrame(loop);
  </script>

  <!-- Registrar Service Worker (PWA/offline) -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js");
      });
    }
  </script>
</body>
</html>
